[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
# Tests fork Polygon 137 internally via vm.createSelectFork(POLYGON_RPC) (default in the test).
remappings = [
    "forge-std/=lib/forge-std/src/",
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
